kind = "web"
previewPath = "/"
title = "Machine Verification Certificate"
version = "1.0.0"
id = "artifacts/prime-verifier"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24197

[services.development]
run = "pnpm --filter @workspace/prime-verifier run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prime-verifier", "run", "build" ]
publicDir = "artifacts/prime-verifier/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24197"
BASE_PATH = "/"
