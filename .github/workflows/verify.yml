name: Opera Numerorum Chain Verify
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lock M7 manifest (master hash)
        run: |
          sha256sum -c <<< "fd4451762e1f60b0a72b08919723f4ed016cbbad75849434ed638f6e4a1744ba  m7.out"
          echo "M7 manifest: LOCKED"

      - name: Lock invariants.json
        run: |
          sha256sum -c <<< "9bbe95ed745db766cf65fe872f5b5ab27a065fef90df7400fb2f07d49c62cded  certificates/invariants.json"
          echo "invariants.json: LOCKED"

      - name: Verify m1-m6 outputs are present
        run: |
          for f in m1.out m2.out m3.out m4.out m5.out m6.out m7.out; do
            test -f "$f" && echo "  $f: present" || (echo "  MISSING: $f" && exit 1)
          done
          echo "All certified outputs present."

      - name: Run recertify self-check
        run: python3 certificates/recertify.py --self-check
