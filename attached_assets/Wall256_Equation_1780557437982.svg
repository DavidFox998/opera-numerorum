<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="738" viewBox="0 0 1060 738" font-family="DejaVu Sans, Arial, Helvetica, sans-serif"><rect width="1060" height="738" fill="#ffffff"/><defs/><text x="40" y="54" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="25" font-weight="bold" font-style="normal" fill="#1a1d27" text-anchor="start">Wall256 — derivation in language (clean)</text><text x="40" y="80" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="start">symbols ⇄ plain language  ·  each arrow tagged PROVEN (machine-checked) or OPEN (hypothesis)</text><rect x="40" y="110" width="980" height="80" rx="12" ry="12" fill="#f5f6fa" stroke="#d4d8e2" stroke-width="1.5"/><rect x="40" y="110" width="6" height="80" rx="3" ry="3" fill="#d23f3f"/><text x="64" y="143" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="18.5" font-weight="bold" font-style="normal" fill="#23408e" text-anchor="start">w1 &lt; 1/7</text><text x="64" y="166" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">single-site Haar weight is small</text><rect x="958" y="122" width="48" height="22" rx="11.0" ry="11.0" fill="#d23f3f"/><text x="982.0" y="137.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">OPEN</text><text x="950" y="137" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="end">[H1]</text><line x1="70" y1="194" x2="70" y2="216" stroke="#6b7280" stroke-width="2"/><rect x="40" y="220" width="980" height="80" rx="12" ry="12" fill="#f5f6fa" stroke="#d4d8e2" stroke-width="1.5"/><rect x="40" y="220" width="6" height="80" rx="3" ry="3" fill="#d23f3f"/><text x="64" y="253" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="18.5" font-weight="bold" font-style="normal" fill="#23408e" text-anchor="start">⇒  a n ≤ e^(−I·n),  rate  I &gt; log 7</text><text x="64" y="276" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">Osterwalder–Seiler: smallness propagates to a per-size polymer activity bound</text><rect x="958" y="232" width="48" height="22" rx="11.0" ry="11.0" fill="#d23f3f"/><text x="982.0" y="247.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">OPEN</text><text x="950" y="247" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="end">[H2]</text><line x1="70" y1="304" x2="70" y2="326" stroke="#6b7280" stroke-width="2"/><rect x="40" y="330" width="980" height="102" rx="12" ry="12" fill="#f5f6fa" stroke="#d4d8e2" stroke-width="1.5"/><rect x="40" y="330" width="6" height="102" rx="3" ry="3" fill="#1f9d57"/><text x="64" y="363" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="18.5" font-weight="bold" font-style="normal" fill="#23408e" text-anchor="start">⇒  ∑ₙ N n · a n ≤ ∑ₙ 7ⁿ·e^(−I·n) = ∑ₙ (7·e^(−I))ⁿ &lt; ∞</text><text x="64" y="386" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">term-by-term comparison test; converges since  I &gt; log 7 ⇔ 7·e^(−I) &lt; 1</text><text x="64" y="407" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" font-style="italic" fill="#c97a00" text-anchor="start">↳ hinge — strict &lt; 1/7 is essential:  = 1/7 ⇒ I = log 7 ⇒ ∑ₙ 1 diverges</text><rect x="941" y="342" width="65" height="22" rx="11.0" ry="11.0" fill="#1f9d57"/><text x="973.5" y="357.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">PROVEN</text><text x="933" y="357" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="end">kp_summable_of_truncatedActivity</text><line x1="70" y1="436" x2="70" y2="458" stroke="#6b7280" stroke-width="2"/><rect x="40" y="462" width="980" height="80" rx="12" ry="12" fill="#f5f6fa" stroke="#d4d8e2" stroke-width="1.5"/><rect x="40" y="462" width="6" height="80" rx="3" ry="3" fill="#d23f3f"/><text x="64" y="495" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="18.5" font-weight="bold" font-style="normal" fill="#23408e" text-anchor="start">⇒  0 &lt; ρ &lt; 1  ∧  |corr x y| ≤ C·ρ^(sep x y)</text><text x="64" y="518" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">Brydges–Federbush: summability ⇒ geometric two-point clustering</text><rect x="958" y="474" width="48" height="22" rx="11.0" ry="11.0" fill="#d23f3f"/><text x="982.0" y="489.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">OPEN</text><text x="950" y="489" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="end">[H3]</text><line x1="70" y1="546" x2="70" y2="568" stroke="#6b7280" stroke-width="2"/><rect x="40" y="572" width="980" height="80" rx="12" ry="12" fill="#f5f6fa" stroke="#d4d8e2" stroke-width="1.5"/><rect x="40" y="572" width="6" height="80" rx="3" ry="3" fill="#1f9d57"/><text x="64" y="605" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="18.5" font-weight="bold" font-style="normal" fill="#23408e" text-anchor="start">⇒  Δ = −log ρ &gt; 0,  |corr x y| ≤ C·e^(−Δ·sep x y)</text><text x="64" y="628" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">ρ^d = e^(−Δ·d) algebra</text><rect x="941" y="584" width="65" height="22" rx="11.0" ry="11.0" fill="#1f9d57"/><text x="973.5" y="599.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">PROVEN</text><text x="933" y="599" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="end">mass_gap_pos_of_spectral_gap</text><rect x="40" y="666" width="980" height="44" rx="10" ry="10" fill="#fbf3e6" stroke="#e7d5ac" stroke-width="1.5"/><text x="58" y="693" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" font-style="normal" fill="#c97a00" text-anchor="start">Holds ONLY IF H1–H3 are discharged.  LATTICE scope, NOT the Clay mass gap.  corr / sep are abstract.</text></svg>